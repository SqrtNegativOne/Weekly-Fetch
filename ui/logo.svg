<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Connector arms from center to outer nodes -->
  <line x1="32" y1="32" x2="32" y2="4"  stroke="#6366f1" stroke-width="2" stroke-opacity="0.45" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="56" y2="46" stroke="#6366f1" stroke-width="2" stroke-opacity="0.45" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="8"  y2="46" stroke="#6366f1" stroke-width="2" stroke-opacity="0.45" stroke-linecap="round"/>

  <!-- Outer source nodes (the three platforms being fetched) -->
  <circle cx="32" cy="4"  r="5" fill="#818cf8"/>
  <circle cx="56" cy="46" r="5" fill="#818cf8"/>
  <circle cx="8"  cy="46" r="5" fill="#818cf8"/>

  <!-- Center hub -->
  <circle cx="32" cy="32" r="12" fill="#1e1b4b" stroke="#6366f1" stroke-width="2.5"/>

  <!-- Fetch / download arrow inside hub -->
  <line x1="32" y1="25" x2="32" y2="35"
        stroke="#a5b4fc" stroke-width="2.5" stroke-linecap="round"/>
  <polyline fill="none" points="27,32 32,38 37,32"
            stroke="#a5b4fc" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
