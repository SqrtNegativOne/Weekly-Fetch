name: Build & Release

# Trigger: push a tag like v1.0.0, v0.2.3, etc.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write          # needed to create a GitHub Release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # Install project deps + dev group (pyinstaller)
      - run: uv sync --group dev

      # Build the exe
      - run: uv run pyinstaller WeeklyFetch.spec

      # Zip the output folder
      - run: Compress-Archive -Path dist/WeeklyFetch -DestinationPath dist/WeeklyFetch-${{ github.ref_name }}.zip
        shell: pwsh

      # Create a GitHub Release with the zip attached
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/WeeklyFetch-${{ github.ref_name }}.zip
          generate_release_notes: true
